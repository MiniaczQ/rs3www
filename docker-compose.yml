version: "3.4"
services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=dev-access-key
      - MINIO_ROOT_PASSWORD=dev-secret-key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  
  createbuckets:
    image: minio/minio
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        /usr/bin/mc alias set dev-minio http://minio:9000 dev-access-key dev-secret-key;
        /usr/bin/mc mb dev-minio/dev-bucket;
        exit
      "

volumes:
  minio_data:
